# tmux configuration generated by tmux.info
# https://tmux.info/tools/config-generator


# Enable Mouse Support
set -g mouse on

# Increase History Limit
set -g history-limit 50000

# Start Index at 1
set -g base-index 1
setw -g pane-base-index 1

# True Color Support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# macOS: Option+s sends 'ß' — Linux: Alt+s is M-s
unbind C-b
unbind C-a
if-shell "uname | grep -q Darwin" \
  "set -g prefix 'ß'; bind 'ß' send-prefix" \
  "set -g prefix 'M-s'; bind 'M-s' send-prefix"

# Splits
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Vim-tmux-navigator (Ctrl+h/j/k/l, no prefix needed)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Reload Binding
bind r source-file ~/.config/tmux/tmux.conf  \; display "Config reloaded!"

# TPM (Plugin Manager)
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
